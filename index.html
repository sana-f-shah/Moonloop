<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonloop</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header>

        <h1>Moonloop</h1>

        <button class="menu-button">
            ☾
        </button>

    </header>

    <main>

        <section class="hero">

            <div class="moon" id="moon">
                🌑
            </div>

            <p class="story">
                The moon has forgotten its light.
            </p>

            <div class="counter">

                <div id="moonlight">
                    0
                </div>

                <span>
                    Moonlight
                </span>

            </div>

            <p class="clickHint">
                Click anywhere to gather Moonlight
            </p>

        </section>

        <section class="panels">

            <div class="journal">

                <h2>📜 Journal</h2>

                <p id="statusMessage">
                    The moon waits patiently...
                </p>

            </div>

            <div class="restoration">

                <h2>🌙 Restoration</h2>

                <div class="restorationList">

                    <div class="upgrade">

                        <h3>🪨 Moonstone</h3>

                        <p>
                            Restored:
                            <span id="moonstoneCount">0</span>
                        </p>

                        <button id="buyMoonstone">
                            Restore (10)
                        </button>

                    </div>

                    <div class="upgrade locked">🌿 Lunar Moss</div>

                    <div class="upgrade locked">🌸 Moon Blossom</div>

                    <div class="upgrade locked">🦋 Lumen Moths</div>

                    <div class="upgrade locked">🌳 Crystal Grove</div>

                </div>

            </div>

        </section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
